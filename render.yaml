services:
  - type: web
    name: hotel-qr-backend
    runtime: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm run render:build
    startCommand: node dist/main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        value: hotel-qr-production-secret-2026
      - key: NODE_ENV
        value: production
